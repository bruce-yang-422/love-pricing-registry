<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>戀愛實價登錄</title>
  <meta name="description" content="《戀愛實價登錄》線上閱讀器">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ed;
      --paper: #fffdf8;
      --paper-soft: #fbf7ef;
      --ink: #241f1a;
      --muted: #74685b;
      --line: #ded3c2;
      --accent: #b13f2f;
      --accent-2: #225c64;
      --shadow: 0 18px 50px rgba(48, 37, 25, .12);
      --reader-size: 19px;
      --reader-width: 760px;
    }

    [data-theme="night"] {
      color-scheme: dark;
      --bg: #111315;
      --paper: #1b1e20;
      --paper-soft: #24282b;
      --ink: #eee7dd;
      --muted: #b3a89c;
      --line: #37332f;
      --accent: #ef927e;
      --accent-2: #8bd0d7;
      --shadow: 0 18px 50px rgba(0, 0, 0, .32);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(177, 63, 47, .06), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", "PMingLiU", Georgia, serif;
      line-height: 1.85;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: color-mix(in srgb, var(--paper) 88%, transparent);
      backdrop-filter: blur(14px);
      overflow: auto;
    }

    .brand {
      padding: 4px 8px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 18px 0 14px;
    }

    .tool-button,
    .nav-button,
    .menu-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper-soft);
      color: var(--ink);
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .tool-button:hover,
    .nav-button:hover,
    .menu-button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 58%, var(--line));
    }

    .search {
      width: 100%;
      height: 42px;
      margin-bottom: 14px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .toc {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .chapter-link {
      width: 100%;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 8px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .chapter-link:hover,
    .chapter-link.active {
      background: color-mix(in srgb, var(--accent) 10%, var(--paper));
    }

    .chapter-link.active .chapter-no {
      color: var(--paper);
      background: var(--accent);
      border-color: var(--accent);
    }

    .chapter-no {
      width: 42px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1;
    }

    .chapter-title {
      min-width: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.45;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mobile-topbar {
      display: none;
    }

    .main {
      min-width: 0;
      padding: 44px 32px 72px;
    }

    .reader-shell {
      width: min(100%, var(--reader-width));
      margin: 0 auto;
    }

    .reader-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
    }

    .reader {
      min-height: 70vh;
      padding: clamp(24px, 5vw, 56px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      font-size: var(--reader-size);
    }

    .reader h1,
    .reader h2,
    .reader h3 {
      line-height: 1.45;
      letter-spacing: 0;
    }

    .reader h1 {
      margin: 0 0 32px;
      color: var(--accent);
      font-size: clamp(30px, 6vw, 46px);
      text-wrap: balance;
    }

    .reader h2 {
      margin: 38px 0 14px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 25px;
    }

    .reader h3 {
      margin: 30px 0 10px;
      color: var(--accent-2);
      font-size: 21px;
    }

    .reader p {
      margin: 0 0 1.1em;
      text-align: justify;
    }

    .reader blockquote {
      margin: 24px 0;
      padding: 10px 18px;
      border-left: 4px solid var(--accent);
      background: var(--paper-soft);
      color: var(--muted);
    }

    .reader hr {
      margin: 34px auto;
      width: 42%;
      border: 0;
      border-top: 1px solid var(--line);
    }

    .reader table {
      width: 100%;
      margin: 24px 0;
      border-collapse: collapse;
      font-size: .88em;
      line-height: 1.65;
    }

    .reader th,
    .reader td {
      padding: 9px 10px;
      border: 1px solid var(--line);
      vertical-align: top;
    }

    .reader th {
      background: var(--paper-soft);
      color: var(--accent-2);
    }

    .reader strong {
      color: var(--accent);
      font-weight: 700;
    }

    .reader code {
      padding: .1em .35em;
      border-radius: 5px;
      background: var(--paper-soft);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: .9em;
    }

    .bottom-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .nav-button {
      padding: 11px 14px;
      text-align: center;
    }

    .progress {
      position: fixed;
      inset: 0 0 auto;
      z-index: 10;
      height: 4px;
      background: transparent;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .empty {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      text-align: center;
    }

    @media (max-width: 860px) {
      .app {
        display: block;
      }

      .mobile-topbar {
        position: sticky;
        top: 0;
        z-index: 8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 56px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        backdrop-filter: blur(14px);
      }

      .mobile-title {
        overflow: hidden;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .menu-button {
        width: 44px;
        height: 40px;
        flex: 0 0 auto;
      }

      .sidebar {
        position: fixed;
        inset: 56px 0 0;
        z-index: 9;
        width: min(86vw, 340px);
        height: auto;
        transform: translateX(-105%);
        transition: transform .2s ease;
        box-shadow: var(--shadow);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        padding: 24px 14px 54px;
      }

      .reader {
        padding: 24px 18px;
        border-radius: 8px;
      }

      .reader-meta {
        padding: 0 4px;
      }
    }
  </style>
</head>
<body>
  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
  <div class="mobile-topbar">
    <button class="menu-button" id="menuButton" type="button" aria-label="開啟目錄">☰</button>
    <div class="mobile-title" id="mobileTitle">戀愛實價登錄</div>
    <button class="menu-button" id="themeMobileButton" type="button" aria-label="切換夜間模式">◐</button>
  </div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>戀愛實價登錄</h1>
        <p>台灣都市諷刺小說閱讀器</p>
      </div>

      <div class="toolbar" aria-label="閱讀設定">
        <button class="tool-button" id="smallerButton" type="button" title="縮小字體">A-</button>
        <button class="tool-button" id="largerButton" type="button" title="放大字體">A+</button>
        <button class="tool-button" id="themeButton" type="button" title="切換夜間模式">◐</button>
      </div>

      <input class="search" id="searchInput" type="search" placeholder="搜尋章節" aria-label="搜尋章節">
      <ol class="toc" id="toc"></ol>
    </aside>

    <main class="main">
      <div class="reader-shell">
        <div class="reader-meta">
          <span id="currentChapter">載入中</span>
          <span id="wordCount"></span>
        </div>
        <article class="reader" id="reader" tabindex="-1" aria-live="polite">
          <p class="empty">正在載入小說...</p>
        </article>
        <nav class="bottom-nav" aria-label="章節導覽">
          <button class="nav-button" id="prevButton" type="button">上一章</button>
          <button class="nav-button" id="nextButton" type="button">下一章</button>
        </nav>
      </div>
    </main>
  </div>

  <script>
    const chapters = [
      { no: "01", title: "估價：歡迎登入戀愛實價系統", file: "ch01-估價-歡迎登入戀愛實價系統.md" },
      { no: "02", title: "帶看：物件有瑕疵，需配合議價", file: "ch02-帶看-物件有瑕疵-需配合議價.md" },
      { no: "03", title: "斡旋：情緒管理費的通膨", file: "ch03-斡旋-情緒管理費的通膨.md" },
      { no: "04", title: "凶宅：前任折舊與聯徵紀錄", file: "ch04-凶宅-前任折舊與聯徵紀錄.md" },
      { no: "05", title: "預售：無殼蝸牛的空頭支票", file: "ch05-預售-無殼蝸牛的空頭支票.md" },
      { no: "06", title: "聯貸：長輩的頭期款與股東大會", file: "ch06-聯貸-長輩的頭期款與股東大會.md" },
      { no: "07", title: "斷頭：直男狂跌與舔狗泡沫化", file: "ch07-斷頭-直男狂跌與舔狗泡沫化.md" },
      { no: "08", title: "都更：大齡女子的老屋翻新計畫", file: "ch08-都更-大齡女子的老屋翻新計畫.md" },
      { no: "09", title: "實登：條件的透明與靈魂的隱形", file: "ch09-實登-條件的透明與靈魂的隱形.md" },
      { no: "10", title: "法拍：被市場淘汰的次級品", file: "ch10-法拍-被市場淘汰的次級品.md" },
      { no: "11", title: "點交：這不是我要的成家", file: "ch11-點交-這不是我要的成家.md" },
      { no: "12", title: "退訂：毀約的勇氣與真正的入住", file: "ch12-退訂-毀約的勇氣與真正的入住.md" }
    ];

    const state = {
      current: 1,
      fontSize: Number(localStorage.getItem("reader-font-size")) || 19,
      theme: localStorage.getItem("reader-theme") || "day"
    };

    const toc = document.getElementById("toc");
    const reader = document.getElementById("reader");
    const sidebar = document.getElementById("sidebar");
    const progressBar = document.getElementById("progressBar");
    const currentChapter = document.getElementById("currentChapter");
    const mobileTitle = document.getElementById("mobileTitle");
    const wordCount = document.getElementById("wordCount");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function inlineMarkdown(value) {
      return escapeHtml(value)
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`(.+?)`/g, "<code>$1</code>");
    }

    function parseTable(lines, start) {
      const rows = [];
      let index = start;

      while (index < lines.length && /^\s*\|.+\|\s*$/.test(lines[index])) {
        rows.push(lines[index]);
        index += 1;
      }

      if (rows.length < 2 || !/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(rows[1])) {
        return null;
      }

      const cells = row => row.trim().replace(/^\||\|$/g, "").split("|").map(cell => inlineMarkdown(cell.trim()));
      const head = cells(rows[0]).map(cell => `<th>${cell}</th>`).join("");
      const body = rows.slice(2).map(row => `<tr>${cells(row).map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("");

      return {
        html: `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`,
        next: index
      };
    }

    function markdownToHtml(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        html.push(`<p>${paragraph.map(inlineMarkdown).join("<br>")}</p>`);
        paragraph = [];
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          flushParagraph();
          continue;
        }

        const table = parseTable(lines, i);
        if (table) {
          flushParagraph();
          html.push(table.html);
          i = table.next - 1;
          continue;
        }

        if (/^#{1,3}\s+/.test(trimmed)) {
          flushParagraph();
          const level = trimmed.match(/^#+/)[0].length;
          html.push(`<h${level}>${inlineMarkdown(trimmed.replace(/^#{1,3}\s+/, ""))}</h${level}>`);
          continue;
        }

        if (/^[-*_]{3,}$/.test(trimmed)) {
          flushParagraph();
          html.push("<hr>");
          continue;
        }

        if (trimmed.startsWith(">")) {
          flushParagraph();
          html.push(`<blockquote>${inlineMarkdown(trimmed.replace(/^>\s?/, ""))}</blockquote>`);
          continue;
        }

        if (/^[-*]\s+/.test(trimmed)) {
          flushParagraph();
          const items = [];
          while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
            items.push(`<li>${inlineMarkdown(lines[i].trim().replace(/^[-*]\s+/, ""))}</li>`);
            i += 1;
          }
          i -= 1;
          html.push(`<ul>${items.join("")}</ul>`);
          continue;
        }

        if (/^\d+\.\s+/.test(trimmed)) {
          flushParagraph();
          const items = [];
          while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
            items.push(`<li>${inlineMarkdown(lines[i].trim().replace(/^\d+\.\s+/, ""))}</li>`);
            i += 1;
          }
          i -= 1;
          html.push(`<ol>${items.join("")}</ol>`);
          continue;
        }

        paragraph.push(trimmed);
      }

      flushParagraph();
      return html.join("\n");
    }

    function renderToc(filter = "") {
      const keyword = filter.trim().toLowerCase();
      toc.innerHTML = "";

      chapters
        .map((chapter, index) => ({ ...chapter, index }))
        .filter(chapter => `${chapter.no} ${chapter.title}`.toLowerCase().includes(keyword))
        .forEach(chapter => {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.className = `chapter-link${chapter.index === state.current ? " active" : ""}`;
          button.type = "button";
          button.innerHTML = `<span class="chapter-no">${chapter.no}</span><span class="chapter-title">${escapeHtml(chapter.title)}</span>`;
          button.addEventListener("click", () => loadChapter(chapter.index));
          item.append(button);
          toc.append(item);
        });
    }

    async function loadChapter(index, pushHash = true) {
      state.current = Math.max(0, Math.min(chapters.length - 1, index));
      const chapter = chapters[state.current];

      reader.innerHTML = '<p class="empty">正在載入章節...</p>';
      currentChapter.textContent = `${chapter.no} ${chapter.title}`;
      mobileTitle.textContent = chapter.title;
      wordCount.textContent = "";
      renderToc(document.getElementById("searchInput").value);

      try {
        const response = await fetch(encodeURI(chapter.file));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const markdown = await response.text();
        reader.innerHTML = markdownToHtml(markdown);
        wordCount.textContent = `${markdown.replace(/\s/g, "").length.toLocaleString()} 字`;
        if (pushHash) history.replaceState(null, "", `#${chapter.no}`);
        localStorage.setItem("reader-current", String(state.current));
        window.scrollTo({ top: 0, behavior: "smooth" });
        reader.focus({ preventScroll: true });
      } catch (error) {
        reader.innerHTML = `<p class="empty">讀取失敗：${escapeHtml(chapter.file)}。請確認檔案已和 index.html 放在同一層。</p>`;
      }

      prevButton.disabled = state.current === 0;
      nextButton.disabled = state.current === chapters.length - 1;
      sidebar.classList.remove("open");
    }

    function applySettings() {
      document.documentElement.style.setProperty("--reader-size", `${state.fontSize}px`);
      document.documentElement.dataset.theme = state.theme === "night" ? "night" : "day";
      localStorage.setItem("reader-font-size", String(state.fontSize));
      localStorage.setItem("reader-theme", state.theme);
    }

    function updateProgress() {
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const ratio = height > 0 ? Math.min(100, Math.max(0, scrollTop / height * 100)) : 0;
      progressBar.style.width = `${ratio}%`;
    }

    document.getElementById("smallerButton").addEventListener("click", () => {
      state.fontSize = Math.max(16, state.fontSize - 1);
      applySettings();
    });

    document.getElementById("largerButton").addEventListener("click", () => {
      state.fontSize = Math.min(26, state.fontSize + 1);
      applySettings();
    });

    function toggleTheme() {
      state.theme = state.theme === "night" ? "day" : "night";
      applySettings();
    }

    document.getElementById("themeButton").addEventListener("click", toggleTheme);
    document.getElementById("themeMobileButton").addEventListener("click", toggleTheme);
    document.getElementById("menuButton").addEventListener("click", () => sidebar.classList.toggle("open"));
    document.getElementById("searchInput").addEventListener("input", event => renderToc(event.target.value));
    prevButton.addEventListener("click", () => loadChapter(state.current - 1));
    nextButton.addEventListener("click", () => loadChapter(state.current + 1));
    window.addEventListener("scroll", updateProgress, { passive: true });
    window.addEventListener("hashchange", () => {
      const target = location.hash.replace("#", "");
      const index = chapters.findIndex(chapter => chapter.no === target);
      if (index >= 0) loadChapter(index, false);
    });

    applySettings();
    renderToc();

    const hashIndex = chapters.findIndex(chapter => chapter.no === location.hash.replace("#", ""));
    const savedIndex = Number(localStorage.getItem("reader-current"));
    const initialIndex = Number.isInteger(savedIndex) && savedIndex >= 0 && savedIndex < chapters.length ? savedIndex : 0;
    loadChapter(hashIndex >= 0 ? hashIndex : initialIndex, false);
  </script>
</body>
</html>
