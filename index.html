<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>戀愛實價登錄</title>
  <meta name="description" content="《戀愛實價登錄》LRPR 婚戀行情公開系統">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

  <div class="mobile-topbar">
    <button class="menu-button" id="menuButton" type="button" aria-label="開啟目錄">☰</button>
    <div class="mobile-title" id="mobileTitle">戀愛實價登錄</div>
    <button class="menu-button" id="themeMobileButton" type="button" aria-label="切換夜間看盤">◐</button>
  </div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-sys">
          <span class="brand-id">LRPR</span>
          <span>婚戀行情公開平台</span>
          <span class="brand-ver">v3.8.2</span>
        </div>
        <h1>戀愛實價登錄</h1>
        <p class="brand-sub">透明配對，幸福不炒作。</p>
        <div class="market-status" aria-label="市場狀態">
          <span class="status-dot" aria-hidden="true"></span>
          <span>系統運作中</span>
          <span class="market-index">戀愛指數 ▼2.4%</span>
        </div>
      </div>

      <div class="sidebar-body">
        <div class="toolbar" aria-label="閱讀設定">
          <button class="tool-button" id="smallerButton" type="button" title="降低掛牌字級">A−</button>
          <button class="tool-button" id="largerButton" type="button" title="提高掛牌字級">A＋</button>
          <button class="tool-button" id="themeButton" type="button" title="切換夜間看盤">◐</button>
        </div>

        <input class="search" id="searchInput" type="search" placeholder="搜尋成交行情" aria-label="搜尋成交行情">

        <p class="toc-label">成交案件目錄</p>
        <ol class="toc" id="toc"></ol>
      </div>
    </aside>

    <main class="main">
      <div class="reader-shell">
        <div class="reader-meta">
          <span class="reader-meta-id" id="currentChapter">載入中</span>
          <span class="reader-meta-words" id="wordCount"></span>
        </div>
        <article class="reader" id="reader" tabindex="-1" aria-live="polite">
          <p class="empty">正在調閱成交紀錄…</p>
        </article>
        <nav class="bottom-nav" aria-label="行情導覽">
          <button class="nav-button" id="prevButton" type="button">← 上一筆行情</button>
          <button class="nav-button" id="nextButton" type="button">下一筆行情 →</button>
        </nav>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
